<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>明日之後小秘書 - 功能面板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .feature-card {
            transition: all 0.3s ease;
        }

        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        .admin-mode-border {
            border: 2px dashed #3b82f6;
        }

        input[type="password"] {
            letter-spacing: 0.3em;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            color: white;
            font-size: 0.875rem;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 100;
            white-space: nowrap;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        @media (min-width: 768px) {
            .toast { left: auto; right: 20px; transform: none; font-size: 1rem; border-radius: 0.5rem; }
        }
        .toast.show { opacity: 1; }
        .toast.success { background-color: #10b981; }
        .toast.error { background-color: #ef4444; }
        .toast.info { background-color: #3b82f6; }

        /* 自定義滾動條 */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="min-h-screen flex flex-col relative">

    <header class="glass-panel sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-14 md:h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 md:gap-3">
                <i class="fa-solid fa-gamepad text-xl md:text-2xl text-blue-600"></i>
                <h1 class="text-lg md:text-xl font-bold text-gray-800">明日之後小秘書</h1>
                <span id="cloudStatus" class="ml-2 text-xs text-blue-500 hidden animate-pulse" title="雲端同步中">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                </span>
            </div>
            
            <div class="flex items-center gap-3 md:gap-4">
                <span id="adminStatus" class="text-xs md:text-sm font-medium text-gray-500 hidden flex items-center">
                    <i class="fa-solid fa-shield-halved text-blue-500 mr-1"></i><span class="hidden sm:inline">管理員模式</span>
                </span>
                <button id="loginBtn" onclick="openLoginModal()" class="text-gray-600 hover:text-blue-600 transition-colors p-2">
                    <i class="fa-solid fa-user-lock text-lg md:text-xl"></i>
                </button>
                <button id="logoutBtn" onclick="logout()" class="text-red-500 hover:text-red-700 transition-colors hidden p-2" title="登出">
                    <i class="fa-solid fa-right-from-bracket text-lg md:text-xl"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 md:py-8 w-full">
        <div class="mb-6 md:mb-8">
            <h2 class="text-xl md:text-2xl font-bold text-gray-800 mb-2">功能儀表板</h2>
            <p class="text-sm md:text-base text-gray-500">點擊卡片連結進入統計頁面。（編輯功能需登入管理員）</p>
        </div>

        <!-- 卡片網格：由 JS 動態渲染 -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6" id="featureGrid">
            <div class="col-span-full py-20 text-center text-gray-400">
                <i class="fa-solid fa-spinner fa-spin text-3xl mb-4"></i>
                <p>正在同步雲端資料庫...</p>
            </div>
        </div>
    </main>

    <footer class="text-center py-6 text-gray-500 text-xs md:text-sm border-t border-gray-200 mt-auto">
        <p>Design by 夜雨 &copy; 2026 明日之後小秘書 (GitHub 完整版)</p>
    </footer>

    <!-- 登入 Modal -->
    <div id="loginModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
        <div class="glass-panel rounded-2xl p-6 md:p-8 max-w-sm w-full transform transition-all scale-95 opacity-0" id="loginModalContent">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-lg font-bold text-gray-800"><i class="fa-solid fa-lock text-blue-600 mr-2"></i>管理員登入</h3>
                <button onclick="closeLoginModal()" class="text-gray-400 hover:text-gray-600 p-2">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            <div class="mb-6">
                <input type="password" id="adminPassword" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none text-center text-xl" placeholder="••••" maxlength="4" onkeypress="handleLoginKeyPress(event)">
                <p id="loginError" class="text-red-500 text-xs mt-2 hidden text-center">密碼錯誤</p>
            </div>
            <button onclick="attemptLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-lg transition-colors">解鎖功能</button>
        </div>
    </div>

    <!-- 模組基本資訊設定 Modal -->
    <div id="moduleSettingsModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
        <div class="glass-panel rounded-2xl p-6 md:p-8 max-w-md w-full transform transition-all scale-95 opacity-0" id="moduleModalContent">
            <div class="flex justify-between items-center mb-5">
                <h3 class="text-lg font-bold text-gray-800" id="moduleModalTitle">卡片資訊設定</h3>
                <button onclick="closeModuleSettings()" class="text-gray-400 hover:text-gray-600 p-2">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            <div class="space-y-4 mb-6">
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">卡片標題</label>
                    <input type="text" id="moduleTitle" class="w-full px-3 py-2 rounded border border-gray-300 focus:ring-1 focus:ring-blue-500 outline-none" placeholder="例如：營地管理">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">圖示名稱 (FontAwesome)</label>
                    <input type="text" id="moduleIcon" class="w-full px-3 py-2 rounded border border-gray-300 focus:ring-1 focus:ring-blue-500 outline-none font-mono text-sm" placeholder="fa-shield-halved">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">主題顏色</label>
                    <select id="moduleColor" class="w-full px-3 py-2 rounded border border-gray-300 focus:ring-1 focus:ring-blue-500 outline-none">
                        <option value="indigo">靛藍 (Indigo)</option>
                        <option value="amber">琥珀 (Amber)</option>
                        <option value="emerald">翡翠 (Emerald)</option>
                        <option value="blue">湛藍 (Blue)</option>
                        <option value="rose">玫瑰紅 (Rose)</option>
                        <option value="purple">紫色 (Purple)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-1">簡短描述</label>
                    <textarea id="moduleDesc" class="w-full px-3 py-2 rounded border border-gray-300 focus:ring-1 focus:ring-blue-500 outline-none text-sm h-20" placeholder="說明此功能的用途..."></textarea>
                </div>
            </div>
            <div class="flex gap-2">
                <button id="deleteModuleBtn" onclick="deleteModule()" class="hidden px-4 py-2 bg-red-50 text-red-600 border border-red-100 rounded-lg font-medium hover:bg-red-100 transition-colors">刪除卡片</button>
                <div class="flex-grow"></div>
                <button onclick="closeModuleSettings()" class="px-4 py-2 bg-gray-100 text-gray-600 rounded-lg font-medium">取消</button>
                <button onclick="saveModuleInfo()" class="px-6 py-2 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700">儲存資訊</button>
            </div>
        </div>
    </div>

    <!-- 連結清單設定 Modal -->
    <div id="linkSettingsModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
        <div class="glass-panel rounded-2xl p-6 md:p-8 max-w-2xl w-full max-h-[90vh] flex flex-col transform transition-all scale-95 opacity-0" id="linkModalContent">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg md:text-xl font-bold text-gray-800">
                    <i class="fa-solid fa-link text-blue-600 mr-2"></i>連結設定 - <span id="settingModuleName" class="text-blue-600"></span>
                </h3>
                <button onclick="closeLinkSettings()" class="text-gray-400 hover:text-gray-600 p-2">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            
            <div id="linkRowsContainer" class="flex-grow overflow-y-auto custom-scrollbar space-y-4 pr-2 mb-6">
                <!-- 連結列將動態生成 -->
            </div>

            <div class="flex flex-col sm:flex-row justify-between gap-3 pt-4 border-t border-gray-100">
                <button onclick="addLinkRow()" class="flex items-center justify-center gap-2 px-4 py-2 border-2 border-dashed border-blue-400 text-blue-600 rounded-lg hover:bg-blue-50 transition-colors font-medium">
                    <i class="fa-solid fa-plus"></i> 新增連結按鈕
                </button>
                <div class="flex gap-2">
                    <button onclick="closeLinkSettings()" class="px-6 py-2 bg-gray-100 text-gray-600 rounded-lg font-medium">取消</button>
                    <button onclick="saveLinkSettings()" class="px-6 py-2 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700">儲存所有連結</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"><span id="toastMsg"></span></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 狀態管理
        let isAdmin = false;
        const SECRET_PIN = "1491";
        let currentEditingModuleId = '';
        
        // 預設資料
        const defaultCards = [
            { id: 'activity', title: '活動記錄', icon: 'fa-calendar-check', desc: '記錄日常任務與限時活動進度。', color: 'indigo' },
            { id: 'core', title: '核芯統計', icon: 'fa-gem', desc: '管理武器、護甲核芯庫存與升級。', color: 'amber' },
            { id: 'recipe', title: '食譜統計', icon: 'fa-utensils', desc: '全食譜配方、增益效果與食材庫存。', color: 'emerald' },
            { id: 'species', title: '物種筆記', icon: 'fa-leaf', desc: '記錄圖鑑物、怪物分佈與掉落。', color: 'blue' },
            { id: 'market', title: '市場交易', icon: 'fa-coins', desc: '物價趨勢、利潤計算與市場備忘。', color: 'blue' }
        ];

        let appData = {
            cards: [],
            links: {}
        };

        // GitHub 專用 Firebase Config (已自動帶入您的參數)
        const firebaseConfig = {
            apiKey: "AIzaSyAaCTj-Jy7AuQtCF7HHITD08_3u8sTL3oQ",
            authDomain: "appdashboard-54186.firebaseapp.com",
            projectId: "appdashboard-54186",
            storageBucket: "appdashboard-54186.firebasestorage.app",
            messagingSenderId: "1040759578517",
            appId: "1:1040759578517:web:8daa9d7939c54f2adf209c",
            measurementId: "G-WLW4ZDWLL5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "after-tomorrow-v2-main"; // 固定專案 ID

        // 身份驗證與同步
        const initApp = async () => {
            try {
                await signInAnonymously(auth);
            } catch (err) {
                showToast("連線至 Firebase 失敗", "error");
            }
        };

        initApp();

        onAuthStateChanged(auth, (user) => {
            if (!user) return;
            const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'masterConfig');
            
            onSnapshot(settingsRef, (docSnap) => {
                if (docSnap.exists()) {
                    appData = docSnap.data();
                    if (!appData.cards) appData.cards = [];
                    if (!appData.links) appData.links = {};
                } else {
                    appData = { cards: defaultCards, links: {} };
                    saveToCloud();
                }
                renderFeatureGrid();
            }, (error) => {
                console.error(error);
                showToast("同步錯誤，請確認 Firebase Rules 設定", "error");
            });
        });

        async function saveToCloud() {
            const cloudStatus = document.getElementById('cloudStatus');
            cloudStatus.classList.remove('hidden');
            try {
                const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'masterConfig');
                await setDoc(settingsRef, appData);
            } catch (err) {
                showToast("儲存失敗", "error");
            } finally {
                cloudStatus.classList.add('hidden');
            }
        }

        function renderFeatureGrid() {
            const grid = document.getElementById('featureGrid');
            grid.innerHTML = '';

            appData.cards.forEach(card => {
                const colorMap = {
                    indigo: 'bg-indigo-100 text-indigo-600',
                    amber: 'bg-amber-100 text-amber-600',
                    emerald: 'bg-emerald-100 text-emerald-600',
                    blue: 'bg-blue-100 text-blue-600',
                    rose: 'bg-rose-100 text-rose-600',
                    purple: 'bg-purple-100 text-purple-600'
                };
                const colorClass = colorMap[card.color] || colorMap.indigo;

                const cardEl = document.createElement('div');
                cardEl.className = `glass-panel rounded-xl p-5 md:p-6 feature-card flex flex-col h-full relative group ${isAdmin ? 'admin-mode-border' : ''}`;
                
                const links = appData.links[card.id] || [];
                const linkHtml = links.length > 0 
                    ? links.map(l => `
                        <button onclick="window.openLink('${l.url}')" class="w-full text-left px-3 py-2 bg-white border border-gray-200 rounded-lg hover:border-blue-400 hover:text-blue-600 transition-all text-sm font-medium flex justify-between items-center group">
                            <span>${l.name}</span>
                            <i class="fa-solid fa-chevron-right text-xs opacity-0 group-hover:opacity-100 transition-opacity"></i>
                        </button>
                    `).join('')
                    : `<span class="text-xs text-gray-400">尚未設定連結</span>`;

                cardEl.innerHTML = `
                    <div class="flex items-start justify-between mb-3">
                        <div class="p-2.5 rounded-lg ${colorClass}">
                            <i class="fa-solid ${card.icon} text-xl md:text-2xl"></i>
                        </div>
                        <div class="flex gap-1 ${isAdmin ? '' : 'hidden'}">
                            <button onclick="openModuleSettings('${card.id}')" class="text-gray-400 hover:text-gray-600 p-1"><i class="fa-solid fa-pen-to-square"></i></button>
                            <button onclick="openLinkSettings('${card.id}')" class="text-gray-400 hover:text-blue-600 p-1"><i class="fa-solid fa-gear"></i></button>
                        </div>
                    </div>
                    <h3 class="text-base md:text-lg font-bold text-gray-800 mb-1">${card.title}</h3>
                    <p class="text-gray-600 text-xs md:text-sm flex-grow mb-4">${card.desc}</p>
                    <div class="space-y-2 mt-auto pt-3 border-t border-gray-100">${linkHtml}</div>
                `;
                grid.appendChild(cardEl);
            });

            if (isAdmin) {
                const addBtn = document.createElement('button');
                addBtn.onclick = () => openModuleSettings('');
                addBtn.className = "glass-panel rounded-xl p-10 flex flex-col items-center justify-center border-2 border-dashed border-gray-300 text-gray-400 hover:border-blue-400 hover:text-blue-500 transition-all h-full min-h-[200px]";
                addBtn.innerHTML = `<i class="fa-solid fa-plus text-3xl mb-3"></i><span class="font-bold">新增功能卡片</span>`;
                grid.appendChild(addBtn);
            }
        }

        window.openLink = (url) => {
            if (!url) return;
            window.open(url.startsWith('http') ? url : 'https://' + url, '_blank');
        };

        // --- 彈窗控制 ---
        window.openLoginModal = function() {
            if (isAdmin) return;
            document.getElementById('loginModal').classList.remove('hidden');
            document.getElementById('loginModal').classList.add('flex');
            setTimeout(() => document.getElementById('loginModalContent').classList.add('scale-100', 'opacity-100'), 10);
            document.getElementById('adminPassword').focus();
        };

        window.closeLoginModal = function() {
            document.getElementById('loginModalContent').classList.remove('scale-100', 'opacity-100');
            setTimeout(() => document.getElementById('loginModal').classList.add('hidden'), 300);
        };

        window.attemptLogin = function() {
            if (document.getElementById('adminPassword').value === SECRET_PIN) {
                isAdmin = true;
                updateUIPermissions();
                window.closeLoginModal();
                showToast("已解鎖管理權限", "success");
                renderFeatureGrid();
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        };

        window.logout = function() { isAdmin = false; updateUIPermissions(); showToast("已登出", "info"); renderFeatureGrid(); };
        window.handleLoginKeyPress = (e) => e.key === 'Enter' && window.attemptLogin();

        window.openModuleSettings = function(id) {
            currentEditingModuleId = id;
            if (id) {
                const card = appData.cards.find(c => c.id === id);
                document.getElementById('moduleTitle').value = card.title;
                document.getElementById('moduleIcon').value = card.icon;
                document.getElementById('moduleColor').value = card.color;
                document.getElementById('moduleDesc').value = card.desc;
                document.getElementById('deleteModuleBtn').classList.remove('hidden');
            } else {
                document.getElementById('moduleTitle').value = '';
                document.getElementById('moduleIcon').value = 'fa-rocket';
                document.getElementById('moduleColor').value = 'indigo';
                document.getElementById('moduleDesc').value = '';
                document.getElementById('deleteModuleBtn').classList.add('hidden');
            }
            document.getElementById('moduleSettingsModal').classList.remove('hidden');
            document.getElementById('moduleSettingsModal').classList.add('flex');
            setTimeout(() => document.getElementById('moduleModalContent').classList.add('scale-100', 'opacity-100'), 10);
        };

        window.closeModuleSettings = function() {
            document.getElementById('moduleModalContent').classList.remove('scale-100', 'opacity-100');
            setTimeout(() => document.getElementById('moduleSettingsModal').classList.add('hidden'), 300);
        };

        window.saveModuleInfo = async function() {
            const title = document.getElementById('moduleTitle').value.trim();
            if (!title) return showToast("請輸入標題", "error");
            
            const cardData = {
                id: currentEditingModuleId || 'mod_' + Date.now(),
                title,
                icon: document.getElementById('moduleIcon').value || 'fa-rocket',
                color: document.getElementById('moduleColor').value,
                desc: document.getElementById('moduleDesc').value
            };

            if (currentEditingModuleId) {
                const idx = appData.cards.findIndex(c => c.id === currentEditingModuleId);
                appData.cards[idx] = cardData;
            } else {
                appData.cards.push(cardData);
                appData.links[cardData.id] = [];
            }

            await saveToCloud();
            window.closeModuleSettings();
            showToast("卡片已儲存", "success");
        };

        window.deleteModule = async function() {
            if (!confirm("確定刪除？此操作無法復原。")) return;
            appData.cards = appData.cards.filter(c => c.id !== currentEditingModuleId);
            delete appData.links[currentEditingModuleId];
            await saveToCloud();
            window.closeModuleSettings();
            showToast("卡片已移除", "info");
        };

        window.openLinkSettings = function(id) {
            currentEditingModuleId = id;
            const card = appData.cards.find(c => c.id === id);
            document.getElementById('settingModuleName').textContent = card.title;
            const container = document.getElementById('linkRowsContainer');
            container.innerHTML = '';
            const links = appData.links[id] || [];
            links.forEach(l => addLinkRowUI(l));
            if (links.length === 0) addLinkRowUI();
            document.getElementById('linkSettingsModal').classList.remove('hidden');
            document.getElementById('linkSettingsModal').classList.add('flex');
            setTimeout(() => document.getElementById('linkModalContent').classList.add('scale-100', 'opacity-100'), 10);
        };

        function addLinkRowUI(data = { name: '', url: '' }) {
            const row = document.createElement('div');
            row.className = "p-4 bg-gray-50 rounded-xl border border-gray-200 relative link-row-item";
            row.innerHTML = `
                <button onclick="this.parentElement.remove()" class="absolute -top-2 -right-2 w-6 h-6 bg-red-500 text-white rounded-full flex items-center justify-center text-xs shadow-sm hover:bg-red-600"><i class="fa-solid fa-xmark"></i></button>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <div><label class="block text-xs font-bold text-gray-500 mb-1">按鈕名稱</label><input type="text" class="link-name w-full px-3 py-2 rounded border border-gray-300 text-sm outline-none" value="${data.name}"></div>
                    <div><label class="block text-xs font-bold text-gray-500 mb-1">URL</label><input type="text" class="link-url w-full px-3 py-2 rounded border border-gray-300 text-sm font-mono outline-none" value="${data.url}"></div>
                </div>
            `;
            document.getElementById('linkRowsContainer').appendChild(row);
        }
        window.addLinkRow = () => addLinkRowUI();

        window.saveLinkSettings = async function() {
            const newLinks = [];
            document.querySelectorAll('.link-row-item').forEach(row => {
                const url = row.querySelector('.link-url').value.trim();
                if (url) newLinks.push({ name: row.querySelector('.link-name').value.trim() || '進入統計', url });
            });
            appData.links[currentEditingModuleId] = newLinks;
            await saveToCloud();
            window.closeLinkSettings();
            showToast("連結已更新", "success");
        };

        window.closeLinkSettings = function() {
            document.getElementById('linkModalContent').classList.remove('scale-100', 'opacity-100');
            setTimeout(() => document.getElementById('linkSettingsModal').classList.add('hidden'), 300);
        };

        function updateUIPermissions() {
            document.getElementById('loginBtn').classList.toggle('hidden', isAdmin);
            document.getElementById('logoutBtn').classList.toggle('hidden', !isAdmin);
            document.getElementById('adminStatus').classList.toggle('hidden', !isAdmin);
        }

        function showToast(m, t) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = m;
            toast.className = `toast show ${t}`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        window.onclick = (e) => {
            if (e.target.id === 'loginModal') window.closeLoginModal();
            if (e.target.id === 'linkSettingsModal') window.closeLinkSettings();
            if (e.target.id === 'moduleSettingsModal') window.closeModuleSettings();
        };
    </script>
</body>
</html>
