<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>明日之後小秘書 - 功能面板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .feature-card {
            transition: all 0.3s ease;
        }

        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        .admin-mode-border {
            border: 2px dashed #3b82f6;
        }

        input[type="password"] {
            letter-spacing: 0.3em;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 0.75rem 1.5rem;
            border-radius: 9999px;
            color: white;
            font-size: 0.875rem;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 100;
            white-space: nowrap;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        @media (min-width: 768px) {
            .toast { left: auto; right: 20px; transform: none; font-size: 1rem; border-radius: 0.5rem; }
        }
        .toast.show { opacity: 1; }
        .toast.success { background-color: #10b981; }
        .toast.error { background-color: #ef4444; }
        .toast.info { background-color: #3b82f6; }

        /* 自定義滾動條 */
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="min-h-screen flex flex-col relative">

    <header class="glass-panel sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-14 md:h-16 flex items-center justify-between">
            <div class="flex items-center gap-2 md:gap-3">
                <i class="fa-solid fa-gamepad text-xl md:text-2xl text-blue-600"></i>
                <h1 class="text-lg md:text-xl font-bold text-gray-800">明日之後小秘書</h1>
                <span id="cloudStatus" class="ml-2 text-xs text-blue-500 hidden animate-pulse" title="雲端同步中">
                    <i class="fa-solid fa-cloud-arrow-up"></i>
                </span>
            </div>
            
            <div class="flex items-center gap-3 md:gap-4">
                <span id="adminStatus" class="text-xs md:text-sm font-medium text-gray-500 hidden flex items-center">
                    <i class="fa-solid fa-shield-halved text-blue-500 mr-1"></i><span class="hidden sm:inline">管理員模式</span>
                </span>
                <button id="loginBtn" onclick="openLoginModal()" class="text-gray-600 hover:text-blue-600 transition-colors p-2">
                    <i class="fa-solid fa-user-lock text-lg md:text-xl"></i>
                </button>
                <button id="logoutBtn" onclick="logout()" class="text-red-500 hover:text-red-700 transition-colors hidden p-2" title="登出">
                    <i class="fa-solid fa-right-from-bracket text-lg md:text-xl"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 md:py-8 w-full">
        <div class="mb-6 md:mb-8">
            <h2 class="text-xl md:text-2xl font-bold text-gray-800 mb-2">功能儀表板</h2>
            <p class="text-sm md:text-base text-gray-500">點擊卡片連結進入統計頁面。（編輯連結需登入管理員）</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6" id="featureGrid">
            <!-- 模組卡片 -->
            <div id="card-activity" class="glass-panel rounded-xl p-5 md:p-6 feature-card flex flex-col h-full relative group">
                <div class="flex items-start justify-between mb-3 md:mb-4">
                    <div class="p-2.5 md:p-3 bg-indigo-100 text-indigo-600 rounded-lg">
                        <i class="fa-solid fa-calendar-check text-xl md:text-2xl"></i>
                    </div>
                    <button onclick="openLinkSettings('activity')" class="admin-only hidden text-gray-400 hover:text-blue-600 p-2 -m-2">
                        <i class="fa-solid fa-gear"></i>
                    </button>
                </div>
                <h3 class="text-base md:text-lg font-bold text-gray-800 mb-1 md:mb-2">活動記錄</h3>
                <p class="text-gray-600 text-xs md:text-sm flex-grow mb-4">記錄日常任務與限時活動進度。</p>
                <div class="space-y-2 mt-auto pt-3 border-t border-gray-100 link-container" id="links-activity">
                    <span class="text-xs text-gray-400 flex items-center"><i class="fa-solid fa-spinner fa-spin mr-1"></i>載入中...</span>
                </div>
            </div>

            <div id="card-core" class="glass-panel rounded-xl p-5 md:p-6 feature-card flex flex-col h-full relative group">
                <div class="flex items-start justify-between mb-3 md:mb-4">
                    <div class="p-2.5 md:p-3 bg-amber-100 text-amber-600 rounded-lg">
                        <i class="fa-solid fa-gem text-xl md:text-2xl"></i>
                    </div>
                    <button onclick="openLinkSettings('core')" class="admin-only hidden text-gray-400 hover:text-blue-600 p-2 -m-2">
                        <i class="fa-solid fa-gear"></i>
                    </button>
                </div>
                <h3 class="text-base md:text-lg font-bold text-gray-800 mb-1 md:mb-2">核芯統計</h3>
                <p class="text-gray-600 text-xs md:text-sm flex-grow mb-4">管理武器、護甲核芯庫存與升級。</p>
                <div class="space-y-2 mt-auto pt-3 border-t border-gray-100 link-container" id="links-core">
                    <span class="text-xs text-gray-400 flex items-center"><i class="fa-solid fa-spinner fa-spin mr-1"></i>載入中...</span>
                </div>
            </div>

            <div id="card-recipe" class="glass-panel rounded-xl p-5 md:p-6 feature-card flex flex-col h-full relative group">
                <div class="flex items-start justify-between mb-3 md:mb-4">
                    <div class="p-2.5 md:p-3 bg-emerald-100 text-emerald-600 rounded-lg">
                        <i class="fa-solid fa-utensils text-xl md:text-2xl"></i>
                    </div>
                    <button onclick="openLinkSettings('recipe')" class="admin-only hidden text-gray-400 hover:text-blue-600 p-2 -m-2">
                        <i class="fa-solid fa-gear"></i>
                    </button>
                </div>
                <h3 class="text-base md:text-lg font-bold text-gray-800 mb-1 md:mb-2">食譜統計</h3>
                <p class="text-gray-600 text-xs md:text-sm flex-grow mb-4">全食譜配方、增益效果與食材庫存。</p>
                <div class="space-y-2 mt-auto pt-3 border-t border-gray-100 link-container" id="links-recipe">
                    <span class="text-xs text-gray-400 flex items-center"><i class="fa-solid fa-spinner fa-spin mr-1"></i>載入中...</span>
                </div>
            </div>

            <div id="card-species" class="glass-panel rounded-xl p-5 md:p-6 feature-card flex flex-col h-full relative group">
                <div class="flex items-start justify-between mb-3 md:mb-4">
                    <div class="p-2.5 md:p-3 bg-green-100 text-green-700 rounded-lg">
                        <i class="fa-solid fa-leaf text-xl md:text-2xl"></i>
                    </div>
                    <button onclick="openLinkSettings('species')" class="admin-only hidden text-gray-400 hover:text-blue-600 p-2 -m-2">
                        <i class="fa-solid fa-gear"></i>
                    </button>
                </div>
                <h3 class="text-base md:text-lg font-bold text-gray-800 mb-1 md:mb-2">物種筆記</h3>
                <p class="text-gray-600 text-xs md:text-sm flex-grow mb-4">記錄圖鑑物、怪物分佈與掉落。</p>
                <div class="space-y-2 mt-auto pt-3 border-t border-gray-100 link-container" id="links-species">
                    <span class="text-xs text-gray-400 flex items-center"><i class="fa-solid fa-spinner fa-spin mr-1"></i>載入中...</span>
                </div>
            </div>

            <div id="card-market" class="glass-panel rounded-xl p-5 md:p-6 feature-card flex flex-col h-full relative group">
                <div class="flex items-start justify-between mb-3 md:mb-4">
                    <div class="p-2.5 md:p-3 bg-blue-100 text-blue-600 rounded-lg">
                        <i class="fa-solid fa-coins text-xl md:text-2xl"></i>
                    </div>
                    <button onclick="openLinkSettings('market')" class="admin-only hidden text-gray-400 hover:text-blue-600 p-2 -m-2">
                        <i class="fa-solid fa-gear"></i>
                    </button>
                </div>
                <h3 class="text-base md:text-lg font-bold text-gray-800 mb-1 md:mb-2">市場交易</h3>
                <p class="text-gray-600 text-xs md:text-sm flex-grow mb-4">物價趨勢、利潤計算與市場備忘。</p>
                <div class="space-y-2 mt-auto pt-3 border-t border-gray-100 link-container" id="links-market">
                    <span class="text-xs text-gray-400 flex items-center"><i class="fa-solid fa-spinner fa-spin mr-1"></i>載入中...</span>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center py-6 text-gray-500 text-xs md:text-sm border-t border-gray-200 mt-auto">
        <p>Design by 夜雨 &copy; 2026 明日之後小秘書 (多連結同步版)</p>
    </footer>

    <!-- 登入 Modal -->
    <div id="loginModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
        <div class="glass-panel rounded-2xl p-6 md:p-8 max-w-sm w-full transform transition-all scale-95 opacity-0" id="loginModalContent">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-lg font-bold text-gray-800"><i class="fa-solid fa-lock text-blue-600 mr-2"></i>管理員登入</h3>
                <button onclick="closeLoginModal()" class="text-gray-400 hover:text-gray-600 p-2">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            <div class="mb-6">
                <input type="password" id="adminPassword" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 outline-none text-center text-xl" placeholder="••••" maxlength="4" onkeypress="handleLoginKeyPress(event)">
                <p id="loginError" class="text-red-500 text-xs mt-2 hidden text-center">密碼錯誤</p>
            </div>
            <button onclick="attemptLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 rounded-lg transition-colors">解鎖功能</button>
        </div>
    </div>

    <!-- 連結設定 Modal -->
    <div id="linkSettingsModal" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
        <div class="glass-panel rounded-2xl p-6 md:p-8 max-w-2xl w-full max-h-[90vh] flex flex-col transform transition-all scale-95 opacity-0" id="linkModalContent">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg md:text-xl font-bold text-gray-800">
                    <i class="fa-solid fa-gear text-blue-600 mr-2"></i>設定連結 - <span id="settingModuleName" class="text-blue-600"></span>
                </h3>
                <button onclick="closeLinkSettings()" class="text-gray-400 hover:text-gray-600 p-2">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            
            <div id="linkRowsContainer" class="flex-grow overflow-y-auto custom-scrollbar space-y-4 pr-2 mb-6">
                <!-- 連結編輯列由 JS 生成 -->
            </div>

            <div class="flex flex-col sm:flex-row justify-between gap-3 pt-4 border-t border-gray-100">
                <button onclick="addLinkRow()" class="flex items-center justify-center gap-2 px-4 py-2 border-2 border-dashed border-blue-400 text-blue-600 rounded-lg hover:bg-blue-50 transition-colors font-medium">
                    <i class="fa-solid fa-plus"></i> 新增連結
                </button>
                <div class="flex gap-2">
                    <button onclick="closeLinkSettings()" class="px-6 py-2 bg-gray-100 text-gray-600 rounded-lg font-medium">取消</button>
                    <button onclick="saveLinkSettings()" class="px-6 py-2 bg-blue-600 text-white rounded-lg font-medium hover:bg-blue-700">儲存所有設定</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"><span id="toastMsg"></span></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 狀態與基礎配置
        let isAdmin = false;
        const SECRET_PIN = "1491";
        let currentEditingModule = '';
        const moduleNames = { 'activity': '活動記錄', 'core': '核芯統計', 'recipe': '食譜統計', 'species': '物種筆記', 'market': '市場交易' };
        let linkSettingsData = { activity: [], core: [], recipe: [], species: [], market: [] };

        const firebaseConfig = {
            apiKey: "AIzaSyAaCTj-Jy7AuQtCF7HHiTD08_3u8sTL3oQ",
            authDomain: "appdashboard-54186.firebaseapp.com",
            projectId: "appdashboard-54186",
            storageBucket: "appdashboard-54186.firebasestorage.app",
            messagingSenderId: "1040759578517",
            appId: "1:1040759578517:web:8daa9d7939c54f2adf209c",
            measurementId: "G-WLW4ZDWLL5"
        };
        let app, auth, db;
        try {
            if (Object.keys(firebaseConfig).length > 0) {
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
            } else {
                console.warn("尚未設定 Firebase Config，目前處於離線展示模式。");
            }
        } catch (e) { console.error(e); }
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-after-tomorrow-app';

        /**
         * 身份驗證初始化 (重要：需確保在讀取資料前完成)
         */
        const initApp = async () => {
            if (!auth) return;
            try {
                // 優先嘗試使用 Custom Token，否則使用匿名登入
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (err) {
                console.error("Auth Error:", err);
                showToast("身份驗證失敗，請檢查網路連線", "error");
            }
        };

        // 啟動驗證
        initApp();

        // 當驗證狀態改變時，啟動資料監聽
        if (auth && db) {
            onAuthStateChanged(auth, (user) => {
                if (!user) return; // 尚未登入完成前不執行任何 Firestore 操作
                
                const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'linkData');
            
            // 監聽雲端資料，並增加錯誤處理回調 (防範 Permission Denied)
            onSnapshot(settingsRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    Object.keys(moduleNames).forEach(k => {
                        linkSettingsData[k] = Array.isArray(data[k]) ? data[k] : [];
                    });
                }
                renderAllModuleLinks();
            }, (error) => {
                console.error("Firestore Error:", error);
                if (error.code === 'permission-denied') {
                    showToast("讀取權限不足，請重新整理頁面", "error");
                }
            });
            });
        } else {
            // 離線模式：直接渲染預設狀態
            setTimeout(renderAllModuleLinks, 500);
        }

        // 渲染主畫面按鈕
        function renderAllModuleLinks() {
            Object.keys(moduleNames).forEach(moduleId => {
                const container = document.getElementById(`links-${moduleId}`);
                if (!container) return;
                
                const links = linkSettingsData[moduleId];
                if (!links || links.length === 0) {
                    container.innerHTML = `<span class="text-xs text-gray-400 flex items-center"><i class="fa-solid fa-circle-xmark text-red-300 mr-1"></i>尚未設定連結</span>`;
                } else {
                    container.innerHTML = links.map((link) => `
                        <button onclick="window.openLink('${link.url}')" class="w-full text-left px-3 py-2 bg-white border border-gray-200 rounded-lg hover:border-blue-400 hover:text-blue-600 transition-all text-sm font-medium flex justify-between items-center group">
                            <span>${link.name || '進入統計'}</span>
                            <i class="fa-solid fa-chevron-right text-xs opacity-0 group-hover:opacity-100 transition-opacity"></i>
                        </button>
                    `).join('');
                }
            });
        }

        window.openLink = (url) => {
            if (!url) return;
            let fullUrl = url.startsWith('http') ? url : 'https://' + url;
            window.open(fullUrl, '_blank');
        };

        // --- 設定視窗邏輯 ---
        window.openLinkSettings = function(moduleId) {
            currentEditingModule = moduleId;
            document.getElementById('settingModuleName').textContent = moduleNames[moduleId];
            const container = document.getElementById('linkRowsContainer');
            container.innerHTML = '';
            
            const currentLinks = linkSettingsData[moduleId] || [];
            currentLinks.forEach((link) => addLinkRowUI(link));
            if (currentLinks.length === 0) addLinkRowUI();

            const modal = document.getElementById('linkSettingsModal');
            const content = document.getElementById('linkModalContent');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => content.classList.add('scale-100', 'opacity-100'), 10);
        };

        window.addLinkRow = () => addLinkRowUI();

        function addLinkRowUI(data = { name: '', url: '', type: 'url' }) {
            const container = document.getElementById('linkRowsContainer');
            const row = document.createElement('div');
            row.className = "p-4 bg-gray-50 rounded-xl border border-gray-200 relative link-row-item";
            row.innerHTML = `
                <button onclick="this.parentElement.remove()" class="absolute -top-2 -right-2 w-6 h-6 bg-red-500 text-white rounded-full flex items-center justify-center text-xs shadow-sm hover:bg-red-600">
                    <i class="fa-solid fa-xmark"></i>
                </button>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                    <div class="md:col-span-1">
                        <label class="block text-xs font-bold text-gray-500 mb-1">連結名稱</label>
                        <input type="text" class="link-name w-full px-3 py-2 rounded border border-gray-300 text-sm focus:ring-1 focus:ring-blue-500 outline-none" placeholder="例如：本週採集攻略" value="${data.name}">
                    </div>
                    <div class="md:col-span-1">
                        <label class="block text-xs font-bold text-gray-500 mb-1">類型</label>
                        <select class="link-type w-full px-3 py-2 rounded border border-gray-300 text-sm focus:ring-1 focus:ring-blue-500 outline-none">
                            <option value="url" ${data.type === 'url' ? 'selected' : ''}>網頁連結 (URL)</option>
                            <option value="sheets" ${data.type === 'sheets' ? 'selected' : ''}>Google 試算表</option>
                        </select>
                    </div>
                    <div class="md:col-span-2">
                        <label class="block text-xs font-bold text-gray-500 mb-1">連結 URL</label>
                        <input type="text" class="link-url w-full px-3 py-2 rounded border border-gray-300 text-sm font-mono focus:ring-1 focus:ring-blue-500 outline-none" placeholder="https://..." value="${data.url}">
                    </div>
                </div>
            `;
            container.appendChild(row);
        }

        window.saveLinkSettings = async function() {
            if (!auth.currentUser) {
                showToast("尚未完成連線，請稍後再試", "error");
                return;
            }

            const rows = document.querySelectorAll('.link-row-item');
            const newLinks = [];
            
            rows.forEach(row => {
                const name = row.querySelector('.link-name').value.trim();
                const url = row.querySelector('.link-url').value.trim();
                const type = row.querySelector('.link-type').value;
                if (url) newLinks.push({ name: name || '進入統計', url, type });
            });

            const cloudStatus = document.getElementById('cloudStatus');
            cloudStatus.classList.remove('hidden');

            try {
                const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'linkData');
                const updateData = { ...linkSettingsData, [currentEditingModule]: newLinks };
                await setDoc(settingsRef, updateData, { merge: true });
                window.closeLinkSettings();
                showToast(`已同步 ${newLinks.length} 個連結 ☁️`, 'success');
            } catch (error) {
                console.error("Save Error:", error);
                showToast(`儲存失敗：${error.code}`, 'error');
            } finally {
                cloudStatus.classList.add('hidden');
            }
        };

        window.closeLinkSettings = function() {
            const modal = document.getElementById('linkSettingsModal');
            const content = document.getElementById('linkModalContent');
            content.classList.remove('scale-100', 'opacity-100');
            setTimeout(() => modal.classList.add('hidden'), 300);
        };

        // --- 管理登入邏輯 ---
        window.openLoginModal = function() {
            if (isAdmin) return;
            const modal = document.getElementById('loginModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => document.getElementById('loginModalContent').classList.add('scale-100', 'opacity-100'), 10);
            document.getElementById('adminPassword').focus();
        };

        window.closeLoginModal = function() {
            const content = document.getElementById('loginModalContent');
            content.classList.remove('scale-100', 'opacity-100');
            setTimeout(() => document.getElementById('loginModal').classList.add('hidden'), 300);
        };

        window.attemptLogin = function() {
            const input = document.getElementById('adminPassword').value;
            if (input === SECRET_PIN) {
                isAdmin = true;
                updateUIPermissions();
                window.closeLoginModal();
                showToast('已解鎖管理權限', 'success');
            } else {
                const err = document.getElementById('loginError');
                err.classList.remove('hidden');
                setTimeout(() => err.classList.add('hidden'), 2000);
            }
        };

        window.logout = function() { isAdmin = false; updateUIPermissions(); showToast('已登出', 'info'); };
        window.handleLoginKeyPress = (e) => e.key === 'Enter' && window.attemptLogin();

        function updateUIPermissions() {
            document.querySelectorAll('.admin-only').forEach(el => el.classList.toggle('hidden', !isAdmin));
            document.getElementById('loginBtn').classList.toggle('hidden', isAdmin);
            document.getElementById('logoutBtn').classList.toggle('hidden', !isAdmin);
            document.getElementById('adminStatus').classList.toggle('hidden', !isAdmin);
            document.querySelectorAll('.feature-card').forEach(c => c.classList.toggle('admin-mode-border', isAdmin));
        }

        function showToast(m, t) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMsg').textContent = m;
            toast.className = `toast show ${t}`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // 背景點擊關閉
        window.onclick = function(event) {
            if (event.target == document.getElementById('loginModal')) window.closeLoginModal();
            if (event.target == document.getElementById('linkSettingsModal')) window.closeLinkSettings();
        }
    </script>
</body>
</html>
